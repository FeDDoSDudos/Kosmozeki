services:
  postgres:
    image: postgres:16
    container_name: kosmozeki-db
    environment:
      POSTGRES_DB: kosmozeki
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d kosmozeki"]
      interval: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Kosmozeki.Api/Dockerfile
    container_name: kosmozeki-api
    ports:
      - "5010:5010"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=kosmozeki;Username=user;Password=pass
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
